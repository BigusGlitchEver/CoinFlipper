name: Build Game

on:
  release:
    types: [created]

jobs:
  build-windows:
    name: Build for Windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Windows executable
        uses: love-actions/build@v1
        with:
          platforms: 'windows'
          # This action will create a 'release' directory with the game packaged for Windows.

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/windows/
